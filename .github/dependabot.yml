version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    allow:
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "@types/react"
      - dependency-name: "@types/react-dom"
      - dependency-name: "vite"
      - dependency-name: "@vitejs/*"
      - dependency-name: "tailwindcss"
      - dependency-name: "@tailwindcss/*"
    assignees:
      - yuzuki0371
    labels:
      - dependencies
    commit-message:
      prefix: chore
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
    cooldown:
      default-days: 7

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    allow:
      - dependency-name: "millionco/react-doctor"
    assignees:
      - yuzuki0371
    labels:
      - dependencies
    commit-message:
      prefix: chore
    cooldown:
      default-days: 7
